<div class="min-h-screen bg-slate-100">
  <div class="px-6 py-8">
    <div class="mb-8">
      <h2 class="text-3xl font-bold text-slate-800">Productos</h2>
      <p class="text-slate-500">Listado de productos disponibles</p>
    </div>

    <div *ngIf="errorMessage" class="mb-6 rounded-xl bg-red-100 p-4 text-red-700">
      {{ errorMessage }}
    </div>

    <div *ngIf="isLoading" class="rounded-xl bg-white p-6 text-center shadow">
      Cargando productos...
    </div>

    <div
      *ngIf="!isLoading && products.length > 0"
      class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3"
    >
      <div
        *ngFor="let product of products"
        class="rounded-2xl bg-white p-6 shadow transition hover:shadow-lg"
      >
        <img
          [src]="product.imageUrl || 'https://placehold.co/600x400?text=Sin+Imagen'"
          [alt]="product.name"
          class="mb-4 h-48 w-full rounded-xl object-cover"
        />

        <div class="mb-2 flex items-center justify-between">
          <h2 class="text-xl font-bold text-slate-800">
            {{ product.name }}
          </h2>

          <span
            class="rounded-full px-3 py-1 text-sm"
            [ngClass]="product.available
              ? 'bg-green-100 text-green-700'
              : 'bg-red-100 text-red-700'"
          >
            {{ product.available ? 'Disponible' : 'No disponible' }}
          </span>
        </div>

        <p class="mb-4 text-slate-500">
          {{ product.description }}
        </p>

        <div class="flex items-center justify-between">
          <span class="text-lg font-semibold">
            $ {{ product.price }}
          </span>

          <div class="flex gap-2">
            <button
              (click)="addToCart(product)"
              class="rounded-lg bg-green-600 px-3 py-1 text-sm text-white transition hover:bg-green-700"
            >
              Agregar
            </button>

            <ng-container *ngIf="isAdmin()">
              <button
                (click)="editProduct(product.id)"
                class="rounded-lg bg-blue-600 px-3 py-1 text-sm text-white transition hover:bg-blue-700"
              >
                Editar
              </button>

              <button
                (click)="deleteProduct(product.id)"
                class="rounded-lg bg-red-600 px-3 py-1 text-sm text-white transition hover:bg-red-700"
              >
                Eliminar
              </button>
            </ng-container>
          </div>
        </div>
      </div>
    </div>

    <div
      *ngIf="!isLoading && products.length === 0"
      class="mt-10 text-center text-slate-500"
    >
      No hay productos registrados
    </div>
  </div>
</div>
