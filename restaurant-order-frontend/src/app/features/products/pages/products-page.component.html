<div class="min-h-screen bg-slate-100 px-6 py-10">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold text-slate-800">Productos</h1>
      <p class="text-slate-500">Listado de productos disponibles</p>
    </div>

    <div class="flex gap-3">

      <!-- BOTÓN CREAR (SOLO ADMIN) -->
      <a
        *ngIf="isAdmin()"
        routerLink="/products/create"
        class="rounded-xl bg-slate-800 px-5 py-2 font-semibold text-white hover:bg-slate-900 transition"
      >
        Crear producto
      </a>

      <!-- LOGOUT -->
      <button
        (click)="logout()"
        class="rounded-xl bg-red-600 px-5 py-2 font-semibold text-white hover:bg-red-700 transition"
      >
        Cerrar sesión
      </button>
    </div>
  </div>

  <!-- LOADING -->
  <div *ngIf="isLoading" class="bg-white p-6 rounded-xl text-center shadow">
    Cargando productos...
  </div>

  <!-- ERROR -->
  <div *ngIf="errorMessage" class="bg-red-100 text-red-700 p-4 rounded-xl">
    {{ errorMessage }}
  </div>

  <!-- LISTA -->
  <div
    *ngIf="!isLoading && products.length > 0"
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
  >

    <div
      *ngFor="let product of products"
      class="bg-white rounded-2xl p-6 shadow hover:shadow-lg transition"
    >
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-xl font-bold text-slate-800">
          {{ product.name }}
        </h2>

        <span class="text-sm px-3 py-1 rounded-full bg-green-100 text-green-700">
          Disponible
        </span>
      </div>

      <p class="text-slate-500 mb-4">
        {{ product.description }}
      </p>

      <div class="flex justify-between items-center">
        <span class="text-lg font-semibold">
          $ {{ product.price }}
        </span>

        <!-- EDITAR SOLO ADMIN -->
        <button
          *ngIf="isAdmin()"
          (click)="editProduct(product.id)"
          class="text-sm bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700 transition"
        >
          Editar
        </button>
      </div>
    </div>

  </div>

  <!-- VACÍO -->
  <div
    *ngIf="!isLoading && products.length === 0"
    class="text-center text-slate-500 mt-10"
  >
    No hay productos registrados
  </div>

</div>
