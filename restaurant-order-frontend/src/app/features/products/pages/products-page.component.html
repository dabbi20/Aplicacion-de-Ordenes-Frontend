<div
  *ngFor="let product of products"
  class="bg-white rounded-2xl p-6 shadow hover:shadow-lg transition"
>

  <!-- IMAGEN -->
  <img
    [src]="product.imageUrl || 'https://placehold.co/600x400?text=Sin+Imagen'"
    [alt]="product.name"
    class="mb-4 h-48 w-full rounded-xl object-cover"
  />

  <!-- NOMBRE + ESTADO -->
  <div class="flex justify-between items-center mb-2">
    <h2 class="text-xl font-bold text-slate-800">
      {{ product.name }}
    </h2>

    <span
      class="text-sm px-3 py-1 rounded-full"
      [ngClass]="product.available
        ? 'bg-green-100 text-green-700'
        : 'bg-red-100 text-red-700'"
    >
      {{ product.available ? 'Disponible' : 'No disponible' }}
    </span>
  </div>

  <!-- DESCRIPCIÓN -->
  <p class="text-slate-500 mb-4">
    {{ product.description }}
  </p>

  <!-- PRECIO + ACCIONES -->
  <div class="flex justify-between items-center">

    <span class="text-lg font-semibold">
      $ {{ product.price }}
    </span>

    <div class="flex gap-2">

      <!-- 🛒 AGREGAR AL CARRITO (CLIENT Y ADMIN) -->
      <button
        (click)="addToCart(product)"
        class="text-sm bg-green-600 text-white px-3 py-1 rounded-lg hover:bg-green-700 transition"
      >
        Agregar
      </button>

      <!-- 🔐 SOLO ADMIN -->
      <ng-container *ngIf="isAdmin()">

        <button
          (click)="editProduct(product.id)"
          class="text-sm bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700 transition"
        >
          Editar
        </button>

        <button
          (click)="deleteProduct(product.id)"
          class="text-sm bg-red-600 text-white px-3 py-1 rounded-lg hover:bg-red-700 transition"
        >
          Eliminar
        </button>

      </ng-container>

    </div>
  </div>
</div>
