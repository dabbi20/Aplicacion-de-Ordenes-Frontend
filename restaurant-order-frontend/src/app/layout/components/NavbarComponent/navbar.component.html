<nav class="sticky top-0 z-30 border-b border-slate-200 bg-white px-6 py-4 shadow-sm">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">Restaurant Order System</h1>
      <p class="text-sm text-slate-500">Productos y carrito</p>
    </div>

    <div class="flex items-center gap-3">
      <span class="rounded-full bg-slate-200 px-3 py-1 text-sm font-semibold text-slate-700">
        {{ role }}
      </span>

      <button
        (click)="onCartClick()"
        class="relative rounded-xl bg-green-600 px-5 py-2 font-semibold text-white transition hover:bg-green-700"
      >
        Carrito
        <span
          class="absolute -right-2 -top-2 rounded-full bg-red-600 px-2 py-0.5 text-xs text-white"
          *ngIf="cartCount > 0"
        >
          {{ cartCount }}
        </span>
      </button>

      <a
        *ngIf="isAdmin"
        routerLink="/products/create"
        class="rounded-xl bg-slate-800 px-5 py-2 font-semibold text-white transition hover:bg-slate-900"
      >
        Crear producto
      </a>

      <button
        (click)="onLogoutClick()"
        class="rounded-xl bg-red-600 px-5 py-2 font-semibold text-white transition hover:bg-red-700"
      >
        Cerrar sesión
      </button>
    </div>
  </div>
</nav>
