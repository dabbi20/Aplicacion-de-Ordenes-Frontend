<nav class="sticky top-0 z-50 border-b border-slate-200 bg-white/95 backdrop-blur">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">

    <a routerLink="/products" class="flex items-center gap-3">
      <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-slate-900 text-white font-bold shadow-sm">
        R
      </div>

      <div>
        <p class="text-sm font-semibold leading-none text-slate-900">
          Restaurant Order
        </p>
        <p class="text-xs text-slate-500">
          Sistema de pedidos
        </p>
      </div>
    </a>

    <div class="hidden items-center gap-2 md:flex">
      <a
        routerLink="/products"
        routerLinkActive="bg-slate-900 text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="rounded-xl px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100"
      >
        Productos
      </a>

      <a
        *ngIf="!isAdmin()"
        routerLink="/orders"
        routerLinkActive="bg-slate-900 text-white"
        class="rounded-xl px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100"
      >
        Mis pedidos
      </a>

      <a
        *ngIf="isAdmin()"
        routerLink="/admin/orders"
        routerLinkActive="bg-slate-900 text-white"
        class="rounded-xl px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100"
      >
        Órdenes
      </a>
    </div>

    <div class="flex items-center gap-3">
      <button
        type="button"
        (click)="goToCart()"
        class="relative rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50"
      >
        Carrito

        <span
          *ngIf="cartCount > 0"
          class="absolute -right-2 -top-2 flex h-6 min-w-6 items-center justify-center rounded-full bg-slate-900 px-2 text-xs font-bold text-white"
        >
          {{ cartCount }}
        </span>
      </button>

      <div *ngIf="isAuthenticated()" class="hidden text-right sm:block">
        <p class="text-sm font-semibold text-slate-800">
          {{ username }}
        </p>
        <p class="text-xs uppercase tracking-wide text-slate-500">
          {{ role }}
        </p>
      </div>

      <button
        *ngIf="isAuthenticated(); else guestActions"
        type="button"
        (click)="logout()"
        class="rounded-xl bg-red-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-red-700"
      >
        Cerrar sesión
      </button>

      <ng-template #guestActions>
        <a
          routerLink="/login"
          class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800"
        >
          Iniciar sesión
        </a>
      </ng-template>
    </div>
  </div>
</nav>
